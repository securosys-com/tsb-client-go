image: golang:1.25

stages:
  - test
  - mirror

test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
  tags:
    - Go
  script:
    - go test -v ./...

mirror:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  stage: mirror
  tags:
    - Go
  script:
    - git fetch --tags origin
    - git remote remove github || true
    - git remote add github "https://x-access-token:${GH_TOKEN}@github.com/securosys-com/tsb-client-go.git"
    - git push github refs/remotes/origin/main:refs/heads/main --force

mirror_tag:
  rules:
    - if: $CI_COMMIT_TAG
  stage: mirror
  tags:
    - Go
  script:
    - git fetch --tags origin
    - git remote remove github || true
    - git remote add github "https://x-access-token:${GH_TOKEN}@github.com/securosys-com/tsb-client-go.git"
    - git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
